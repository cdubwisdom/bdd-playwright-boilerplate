on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 24
            - run: npm ci
            - run: npx playwright install --with-deps chromium
            - run: npm run typecheck
            - run: npm run test:ci
            - name: Set report name
              if: always()
              run: echo "REPORT_NAME=saucedemo-report-${{ github.run_number }}-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_ENV"
            - name: Zip HTML report
              if: always()
              run: zip -r "${{ env.REPORT_NAME }}.zip" playwright-report
            - name: Upload report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: ${{ env.REPORT_NAME }}
                path: ${{ env.REPORT_NAME }}.zip